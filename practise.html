<style>
  .request-button {
    background-color: rgb(0, 0, 0);
    color: rgb(255, 255, 255);
    padding: 15px 20px;
    border: none;
    cursor: pointer;
    margin-right: 10px;
  }
  .request-button:hover{
    background-color: black;
    color: white;
    opacity: 0.8 ;
  }
  .request-button:active{
    background-color: rgb(0, 0, 0);
    color: rgb(255, 255, 255);
    opacity: 0.3;
  }
</style>


<button class="request-button">Request now </button>

  }

</style>

<button class="add-button">Add to cart</button>
